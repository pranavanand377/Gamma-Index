<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamma Index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <style>
      #app-boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0f0e;
        z-index: 9999;
        transition: opacity 220ms ease;
      }

      #app-boot-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-wrap {
        text-align: center;
      }

      .boot-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #f0fdf4;
      }

      .boot-name {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .boot-name .accent {
        background: linear-gradient(135deg, #10b981, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .boot-dots {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #10b981;
        animation: bootBounce 0.9s infinite ease-in-out;
      }

      .boot-dot:nth-child(2) {
        background: #34d399;
        animation-delay: 0.1s;
      }

      .boot-dot:nth-child(3) {
        background: #06b6d4;
        animation-delay: 0.2s;
      }

      @keyframes bootBounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.65; }
        40% { transform: translateY(-6px); opacity: 1; }
      }
    </style>

    <div id="app-boot-loader" aria-live="polite" aria-label="Loading Gamma Index">
      <div class="boot-wrap">
        <div class="boot-brand">
          <img src="/logo.png" alt="Gamma Index" width="38" height="38" style="border-radius: 10px; object-fit: contain;" onerror="this.src='/favicon-32x32.png'" />
          <div class="boot-name"><span class="accent">Gamma</span> Index</div>
        </div>
        <div class="boot-dots" aria-hidden="true">
          <span class="boot-dot"></span>
          <span class="boot-dot"></span>
          <span class="boot-dot"></span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
